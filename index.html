<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader Viral</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    height:100vh;
    background: radial-gradient(circle at top, #1f1c2c, #090917);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

/* Animated Glow Background */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#ff0050,transparent 70%);
    filter:blur(150px);
    animation:move 8s infinite alternate;
}

@keyframes move{
    from{transform:translate(-200px,-200px);}
    to{transform:translate(200px,200px);}
}

.container{
    position:relative;
    width:380px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(255,0,80,0.4);
    text-align:center;
    z-index:2;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-size:22px;
    margin-bottom:20px;
    font-weight:700;
}

input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    margin-bottom:15px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#ff0050,#ff4b2b);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #ff0050;
}

.loader{
    margin-top:15px;
    display:none;
    font-size:14px;
    opacity:0.8;
}

video{
    width:100%;
    margin-top:15px;
    border-radius:15px;
}

.download-btn{
    margin-top:10px;
    display:none;
}

.footer{
    margin-top:15px;
    font-size:11px;
    opacity:0.5;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 TikTok Downloader Viral</h1>
    <input type="text" id="url" placeholder="Paste URL TikTok di sini...">
    <button onclick="downloadVideo()">Download Sekarang</button>
    <div class="loader" id="loader">⏳ Memproses video...</div>
    <div id="result"></div>
    <a id="downloadLink" class="download-btn" target="_blank">
        <button>⬇ Download Video</button>
    </a>
    <div class="footer">Fast • Free • No Watermark • 2026</div>
</div>

<script>
async function downloadVideo(){
    const url=document.getElementById("url").value;
    const loader=document.getElementById("loader");
    const result=document.getElementById("result");
    const downloadLink=document.getElementById("downloadLink");

    if(!url){
        alert("Masukkan URL dulu!");
        return;
    }

    loader.style.display="block";
    result.innerHTML="";
    downloadLink.style.display="none";

    try{
        const response=await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`);
        const data=await response.json();

        loader.style.display="none";

        if(data.data){
            const videoUrl=data.data.play;

            result.innerHTML=`
                <h4>${data.data.title}</h4>
                <video controls src="${videoUrl}"></video>
            `;

            downloadLink.href=videoUrl;
            downloadLink.style.display="block";
        }else{
            alert("Video tidak ditemukan!");
        }

    }catch(err){
        loader.style.display="none";
        alert("API error atau diblokir browser!");
    }
}
</script>

</body>
</html>
